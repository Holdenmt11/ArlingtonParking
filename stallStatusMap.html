<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" name="referrer" content="strict-origin-when-cross-origin" />
  <title>Arlington Parking Status</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Initialize map centered on Arlington, VA
  const map = L.map("map").setView([38.8816, -77.0910], 14);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    referrerPolicy: 'strict-origin-when-cross-origin',
    maxZoom:19
  }).addTo(map);

  // Load ExactPark stall data
  fetch("https://api.exactpark.com/api/v2/arlington/status/zones")
    .then(res => res.json())
    .then(json => {
      json.data.forEach(stall => {
        const { lat, long } = stall.location;

        // Color by occupancy
        const color = stall.status === "vacant" ? "green" : "orange";

        L.circleMarker([lat, long], {
          radius: 4,
          color,
          fillOpacity: 0.8
        })
          .addTo(map)
          .bindPopup(`
            <strong>Stall:</strong> ${stall.stallName}<br/>
            <strong>Status:</strong> ${stall.status}<br/>
            <strong>Blockface:</strong> ${stall.blockfaceID}<br/>
            <small>${stall.payloadTimestamp}</small>
          `);
      });
    })
    .catch(err => console.error("ExactPark API error:", err));
</script>

</body>
</html>
