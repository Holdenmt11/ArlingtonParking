<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" name="referrer" content="strict-origin-when-cross-origin" />
  <title>Arlington Parking Status</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />






  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- MarkerCluster CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
/>
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
/>

<!-- MarkerCluster JS -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<!-- MarkerCluster JS -->
<script>
  // Initialize map centered on Arlington, VA
  const map = L.map("map").setView([38.8816, -77.0910], 14);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    referrerPolicy: 'strict-origin-when-cross-origin',
    maxZoom:19
  }).addTo(map);




const clusterGroup = L.markerClusterGroup({
  disableClusteringAtZoom: 18,   // show individual stalls when zoomed in
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  maxClusterRadius: 50
});

map.addLayer(clusterGroup);

fetch("https://api.exactpark.com/api/v2/arlington/status/zones")
  .then(res => res.json())
  .then(json => {
    json.data.forEach(stall => {
      const { lat, long } = stall.location;

      const color =
        stall.status === "vacant" ? "green" : "orange";

      const marker = L.circleMarker([lat, long], {
        radius: 4,
        color,
        weight: 1,
        fillColor: color,
        fillOpacity: 0.85
      });

      marker.bindPopup(`
        <strong>${stall.stallName}</strong><br/>
        Status: ${stall.status}<br/>
        Blockface: ${stall.blockfaceID}<br/>
        <small>${stall.payloadTimestamp}</small>
      `);

      clusterGroup.addLayer(marker);
    });
  })
  .catch(err => console.error(err));


</script>

</body>
</html>
